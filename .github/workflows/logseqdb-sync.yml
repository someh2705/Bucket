name: Sync Logseq DB

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force a republish even when the version matches the current manifest
        required: false
        default: false
        type: boolean
      source_run_id:
        description: Optional Logseq workflow run id to use instead of the latest successful run
        required: false
        type: string
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: write

concurrency:
  group: logseqdb-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4

      - name: Prepare Logseq DB payload
        id: prepare
        shell: pwsh
        env:
          FORCE_SYNC: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
          SOURCE_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $force = $env:FORCE_SYNC -eq 'true'
          $sourceRunId = $env:SOURCE_RUN_ID

          .\scripts\sync-logseqdb.ps1 `
            -Mode prepare `
            -WorkspaceRoot $PWD.Path `
            -Repository '${{ github.repository }}' `
            -Force:$force `
            -SourceRunId $sourceRunId

      - name: Upload Logseq DB nupkg artifact
        id: upload_raw
        if: steps.prepare.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.raw_artifact_name }}
          path: ${{ steps.prepare.outputs.raw_payload_directory }}
          if-no-files-found: error
          compression-level: 0

      - name: Upload Logseq DB Scoop artifact
        id: upload_portable
        if: steps.prepare.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.portable_artifact_name }}
          path: ${{ steps.prepare.outputs.portable_payload_directory }}
          if-no-files-found: error
          compression-level: 0

      - name: Update manifest
        if: steps.prepare.outputs.should_publish == 'true'
        shell: pwsh
        run: |
          .\scripts\sync-logseqdb.ps1 `
            -Mode finalize `
            -WorkspaceRoot $PWD.Path `
            -Repository '${{ github.repository }}' `
            -MetadataPath '${{ steps.prepare.outputs.metadata_path }}' `
            -UploadedArtifactId '${{ steps.upload_portable.outputs.artifact-id }}' `
            -ArtifactDigest '${{ steps.upload_portable.outputs.artifact-digest }}'

      - name: Commit manifest update
        if: steps.prepare.outputs.should_publish == 'true'
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bucket/logseqdb.json

          if (git diff --cached --quiet) {
            Write-Host 'No manifest changes to commit.'
            exit 0
          }

          git commit -m "logseqdb: update to ${{ steps.prepare.outputs.manifest_version }}"
          git push

      - name: Report skipped update
        if: steps.prepare.outputs.should_publish != 'true'
        shell: pwsh
        run: |
          Write-Host 'No new Logseq DB version was detected. Skipping publish and manifest update.'
