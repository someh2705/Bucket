name: Sync Logseq DB

on:
  workflow_dispatch:
    inputs:
      source_run_number:
        description: Optional Logseq workflow run number to use directly (for example 2145)
        required: false
        type: string
      force:
        description: Force a republish even when the version matches the current manifest
        required: false
        default: false
        type: boolean
      source_run_id:
        description: Optional Logseq workflow run id to use instead of the latest successful run
        required: false
        type: string
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: write

concurrency:
  group: logseqdb-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4

      - name: Prepare Logseq DB payload
        id: prepare
        shell: pwsh
        env:
          FORCE_SYNC: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
          SOURCE_RUN_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_number || '' }}
          SOURCE_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $force = $env:FORCE_SYNC -eq 'true'
          $sourceRunNumber = $env:SOURCE_RUN_NUMBER
          $sourceRunId = $env:SOURCE_RUN_ID

          .\scripts\sync-logseqdb.ps1 `
            -Mode prepare `
            -WorkspaceRoot $PWD.Path `
            -Repository '${{ github.repository }}' `
            -Force:$force `
            -SourceRunNumber $sourceRunNumber `
            -SourceRunId $sourceRunId

      - name: Publish versioned release asset
        if: steps.prepare.outputs.should_publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
        run: |
          function Invoke-Gh {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              [string[]]$Arguments
            )

            & gh @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "gh $($Arguments -join ' ') failed."
            }
          }

          $releaseNotes = @"
          Versioned Logseq DB build for Scoop.

          - App version: ${{ steps.prepare.outputs.app_version }}
          - Scoop version: ${{ steps.prepare.outputs.manifest_version }}
          - Source run: ${{ steps.prepare.outputs.source_run_id }}
          - Source run number: ${{ steps.prepare.outputs.source_run_number }}
          "@

          gh release view $env:RELEASE_TAG --json tagName 2>$null | Out-Null
          $releaseExists = $LASTEXITCODE -eq 0

          if (-not $releaseExists) {
            Invoke-Gh release create $env:RELEASE_TAG `
              --target '${{ github.sha }}' `
              --title 'Logseq DB ${{ steps.prepare.outputs.manifest_version }}' `
              --notes $releaseNotes
          } else {
            Invoke-Gh release edit $env:RELEASE_TAG `
              --title 'Logseq DB ${{ steps.prepare.outputs.manifest_version }}' `
              --notes $releaseNotes

            $release = gh release view $env:RELEASE_TAG --json assets | ConvertFrom-Json
            foreach ($asset in $release.assets) {
              Invoke-Gh release delete-asset $env:RELEASE_TAG $asset.name --yes
            }
          }

          Invoke-Gh release upload $env:RELEASE_TAG "${{ steps.prepare.outputs.payload_path }}" --clobber

      - name: Trim old Logseq DB releases
        if: steps.prepare.outputs.should_publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Invoke-Gh {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              [string[]]$Arguments
            )

            & gh @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "gh $($Arguments -join ' ') failed."
            }
          }

          $releases = gh api "repos/${{ github.repository }}/releases?per_page=100" | ConvertFrom-Json
          $staleReleases = $releases |
            Where-Object { $_.tag_name -like 'logseqdb-*' } |
            Sort-Object created_at -Descending |
            Select-Object -Skip 10

          foreach ($release in $staleReleases) {
            Invoke-Gh release delete $release.tag_name --cleanup-tag --yes
          }

      - name: Update manifest
        if: steps.prepare.outputs.should_publish == 'true'
        shell: pwsh
        run: |
          .\scripts\sync-logseqdb.ps1 `
            -Mode finalize `
            -WorkspaceRoot $PWD.Path `
            -Repository '${{ github.repository }}' `
            -MetadataPath '${{ steps.prepare.outputs.metadata_path }}' `
            -AssetHash '${{ steps.prepare.outputs.asset_hash }}'

      - name: Commit manifest update
        if: steps.prepare.outputs.should_publish == 'true'
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bucket/logseqdb.json

          if (git diff --cached --quiet) {
            Write-Host 'No manifest changes to commit.'
            exit 0
          }

          git commit -m "logseqdb: update to ${{ steps.prepare.outputs.manifest_version }}"
          git push

      - name: Report skipped update
        if: steps.prepare.outputs.should_publish != 'true'
        shell: pwsh
        run: |
          Write-Host 'No new Logseq DB version was detected. Skipping publish and manifest update.'
